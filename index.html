    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #2C5F2D;
            --leaf-green: #97BC62;

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        header { background: #fff; border-bottom: 1px solid #eee; padding: 20px 0; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; text-decoration: none; }
        .cta-button { background: var(--forest-green); color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; }
        .hero { background: var(--warm-cream); padding: 80px 0; text-align: center; }
        .hero h1 { font-size: 48px; margin-bottom: 10px; }
        .hero p { font-size: 18px; max-width: 600px; margin: 0 auto 30px; }
        footer { background: var(--charcoal); color: #fff; padding: 40px 0; font-size: 14px; margin-top: 60px; }

</head>

            <div style="display: flex; gap: 15px; justify-content: center;">

    <footer>
