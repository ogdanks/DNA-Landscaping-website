<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | DNA Landscaping</title>
  <style>
    :root {
      --primary-green: #2E8B57;
      --accent-gold: #D4AF37;
      --light-bg: #F5F5F5;
      --dark-text: #333333;
      --light-text: #FFFFFF;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--light-bg);
      color: var(--dark-text);
    }

    header {
      background-color: var(--primary-green);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--light-text);
    }

    nav a {
      margin-left: 20px;
      color: var(--light-text);
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      color: var(--accent-gold);
    }

    .hero {
      background-color: var(--primary-green);
      color: var(--light-text);
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      max-width: 700px;
      margin: 0 auto;
    }

    .gallery {
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .gallery h2 {
      text-align: center;
      margin-bottom: 40px;
      color: var(--primary-green);
    }

    .project {
      margin-bottom: 60px;
    }

    .project h3 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--dark-text);
    }

    .project-images {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .project-images img {
      width: calc(33% - 20px);
      max-width: 300px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .project-images img:hover {
      transform: scale(1.05);
    }

    footer {
      background-color: var(--dark-text);
      color: var(--light-text);
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .project-images img {
        width: calc(50% - 20px);
      }
    }

    @media (max-width: 480px) {
      .project-images img {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">DNA LANDSCAPING</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Our Projects</h1>
    <p>Explore our portfolio of stunning landscape designs and transformations.</p>
  </section>

  <section class="gallery">
    <div class="project">
      <h3>Stone Masonry & Foundations</h3>
      <div class="project-images">
        <img src="assets/images/projects/IMG_20260606_150510.jpg" alt="Stone masonry detail">
        <img src="assets/images/projects/IMG_20260606_150422.jpg" alt="Foundation work">
        <img src="assets/images/projects/IMG_20260606_150509.jpg" alt="Stone pathway">
      </div>
    </div>
    <div class="project">
      <h3>Large-Scale Privacy Hedge Sculpting</h3>
      <div class="project-images">
        <img src="assets/images/projects/IMG_20260606_150510 (1).jpg" alt="Hedge sculpting detail">
        <img src="assets/images/projects/IMG_20260606_150510 (2).jpg" alt="Finished hedge">
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 DNA Landscaping. All rights reserved.</p>
  </footer>
</body>
</html>
